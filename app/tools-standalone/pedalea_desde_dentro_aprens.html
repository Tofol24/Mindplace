<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#3f5e4e">
<title>Pedalea desde dentro · APRENS</title>
<style>
  :root{
    --bg:#f5f1e8; --bg2:#efe9dc; --card:#fffdf9; --tinta:#2b2822; --suau:#756d5f;
    --montana:#3f5e4e; --montana-d:#2c4638; --montana-lt:#e2ece5;
    --azul:#33566b; --azul-lt:#dde8ee;
    --ambar:#c07b2e; --ambar-d:#9a5f1c; --ambar-lt:#f6e7d2;
    --amor:#5e8f6f; --amor-d:#436b52; --amor-lt:#e4efe6;
    --latigo:#6a7480; --latigo-d:#4d5560; --latigo-lt:#e7eaed;
    --oro:#a9781f;
    --linia:#e4dccb; --linia2:#d8cfba;
    --ombra:0 6px 22px rgba(60,50,30,.10); --ombra-s:0 2px 10px rgba(60,50,30,.07);
    --serif:'Iowan Old Style','Palatino Linotype',Palatino,'Book Antiqua',Georgia,'Times New Roman',serif;
    --r:16px;
  }
  :root[data-theme="dark"]{
    --bg:#1c1f1d; --bg2:#171a18; --card:#242926; --tinta:#ece7dc; --suau:#a49a89;
    --montana:#79b394; --montana-d:#9ecbb1; --montana-lt:#243430;
    --azul:#8fb6cc; --azul-lt:#223038;
    --ambar:#e0a35a; --ambar-d:#eab978; --ambar-lt:#3a2c17;
    --amor:#82c39c; --amor-d:#a2d3b5; --amor-lt:#233029;
    --latigo:#9aa4b0; --latigo-d:#b6bec8; --latigo-lt:#2a2f34;
    --oro:#d7ac5a;
    --linia:#39413c; --linia2:#454e48;
    --ombra:0 6px 22px rgba(0,0,0,.35); --ombra-s:0 2px 10px rgba(0,0,0,.25);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--tinta);line-height:1.55;font-size:16px;-webkit-font-smoothing:antialiased;
    padding-bottom:calc(78px + env(safe-area-inset-bottom))}
  .wrap{max-width:640px;margin:0 auto;padding:0 15px}

  /* Top bar */
  .top{position:sticky;top:0;z-index:40;background:linear-gradient(180deg,var(--bg) 60%,rgba(245,241,232,0));padding:14px 15px 8px;display:flex;align-items:center;gap:11px;max-width:640px;margin:0 auto}
  :root[data-theme="dark"] .top{background:linear-gradient(180deg,var(--bg) 60%,rgba(28,31,29,0))}
  .logo{width:34px;height:34px;border-radius:50%;background:var(--montana);color:#fff;display:grid;place-items:center;font-weight:700;font-family:var(--serif);font-size:12px;flex:0 0 auto}
  .top .tt{font-family:var(--serif);font-weight:700;font-size:16px;line-height:1.1}
  .top .ts{font-size:10.5px;color:var(--suau)}
  .top .sp{margin-left:auto}
  .iconbtn{background:var(--card);border:1px solid var(--linia);color:var(--tinta);width:38px;height:38px;border-radius:11px;cursor:pointer;font-size:17px;display:grid;place-items:center}

  h1.view-t{font-family:var(--serif);font-size:24px;margin:6px 0 2px;font-weight:700}
  .view-s{color:var(--suau);font-size:14px;margin:0 0 14px}
  .kick{display:inline-block;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--montana-d);background:var(--montana-lt);border:1px solid var(--linia);padding:5px 12px;border-radius:999px;font-weight:600;margin:8px 0 6px}

  .card{background:var(--card);border:1px solid var(--linia);border-radius:var(--r);padding:18px 16px;margin:14px 0;box-shadow:var(--ombra-s)}
  .card h2{font-family:var(--serif);font-size:18px;margin:0 0 4px;display:flex;align-items:center;gap:9px}
  .card h2 .e{font-size:20px}
  .card .lead{color:var(--suau);font-size:14px;margin:4px 0 10px}
  .card p{margin:8px 0}
  .muted{color:var(--suau);font-size:13.5px}

  .quote{font-family:var(--serif);font-style:italic;color:var(--montana-d);background:var(--montana-lt);border-left:4px solid var(--oro);border-radius:0 12px 12px 0;padding:12px 15px;margin:12px 0;font-size:15.5px;line-height:1.5}

  /* Botones */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:0;border-radius:12px;background:var(--montana);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;padding:13px 18px;min-height:48px;transition:transform .07s}
  .btn:active{transform:scale(.98)}
  .btn.full{width:100%}
  .btn.ghost{background:transparent;color:var(--montana-d);border:1.5px solid var(--montana)}
  .btn.amber{background:var(--ambar)}
  .btn.amor{background:var(--amor)}
  .btn.sm{padding:9px 13px;min-height:40px;font-size:13.5px;border-radius:10px}
  .btn.gris{background:var(--latigo)}
  .btn.danger{background:#b5433a}
  .btnrow{display:flex;gap:9px;flex-wrap:wrap}
  .btnrow .btn{flex:1}
  .btn:focus-visible,.qa:focus-visible,.opt:focus-visible,.chip:focus-visible,.scaleb:focus-visible,.tab:focus-visible,.pyr-band:focus-visible{outline:3px solid var(--oro);outline-offset:2px}
  .link{background:none;border:0;color:var(--montana-d);text-decoration:underline;cursor:pointer;font-family:inherit;font-size:13.5px;padding:8px 4px}

  /* Accesos rápidos (home) */
  .qgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin:10px 0}
  .qa{background:var(--card);border:1px solid var(--linia);border-radius:14px;padding:15px 13px;text-align:left;cursor:pointer;font-family:inherit;color:var(--tinta);box-shadow:var(--ombra-s);display:flex;flex-direction:column;gap:5px;min-height:88px}
  .qa .qe{font-size:23px}
  .qa .qn{font-weight:700;font-size:14.5px;line-height:1.2}
  .qa .qd{font-size:11.5px;color:var(--suau);line-height:1.3}
  .qa:active{transform:scale(.98)}

  .stat3{display:flex;gap:9px;text-align:center}
  .stat3>div{flex:1;background:var(--montana-lt);border:1px solid var(--linia);border-radius:12px;padding:12px 6px}
  .stat3 b{display:block;font-family:var(--serif);font-size:24px;color:var(--montana-d);line-height:1}
  .stat3 span{font-size:11px;color:var(--suau)}

  /* Formularios genéricos */
  .fld{margin:16px 0}
  .fld>label{display:block;font-size:14px;font-weight:600;margin-bottom:8px}
  .fld .hint{font-size:12.5px;color:var(--suau);font-weight:400;margin-top:2px}
  input[type=text],input[type=number],input[type=time],input[type=date],textarea,select{
    width:100%;border:1.5px solid var(--linia2);border-radius:11px;padding:11px 12px;font-family:inherit;font-size:15px;
    color:var(--tinta);background:var(--card)}
  textarea{resize:vertical;min-height:60px;line-height:1.5}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--montana)}
  .scale{display:flex;gap:4px;flex-wrap:wrap}
  .scaleb{flex:1;min-width:26px;min-height:42px;border:1.5px solid var(--linia2);border-radius:9px;background:var(--card);cursor:pointer;font-family:inherit;font-weight:700;font-size:14px;color:var(--suau)}
  .scaleb.sel{background:var(--montana);border-color:var(--montana);color:#fff}
  .scale-ends{display:flex;justify-content:space-between;font-size:11.5px;color:var(--suau);margin-top:5px}
  .chips{display:flex;gap:7px;flex-wrap:wrap}
  .chip{min-height:42px;border:1.5px solid var(--linia2);border-radius:11px;background:var(--card);cursor:pointer;font-family:inherit;font-size:13.5px;color:var(--tinta);padding:9px 13px;display:inline-flex;align-items:center;gap:6px}
  .chip.sel{background:var(--montana-lt);border-color:var(--montana);color:var(--montana-d);font-weight:600}
  .opt{display:block;width:100%;text-align:left;border:1.5px solid var(--linia2);border-radius:11px;background:var(--card);cursor:pointer;font-family:inherit;font-size:14px;color:var(--tinta);padding:12px 14px;margin:7px 0}
  .opt.sel{background:var(--montana-lt);border-color:var(--montana);color:var(--montana-d);font-weight:600}

  .ok-flash{background:var(--amor-lt);border:1px solid var(--amor);color:var(--amor-d);border-radius:12px;padding:13px 15px;margin:12px 0;font-size:14px;display:none}
  .ok-flash.show{display:block;animation:fade .3s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* Aviso seguridad */
  .safe{display:flex;gap:10px;background:var(--ambar-lt);border:1px solid #e7cfa6;border-radius:12px;padding:12px 14px;font-size:13px;color:var(--ambar-d);line-height:1.45;align-items:flex-start}
  :root[data-theme="dark"] .safe{border-color:#5a4423}
  .safe .i{flex:0 0 auto;font-size:17px}

  /* Continuo látigo-amor */
  .cont{margin:8px 0}
  input[type=range]{width:100%;accent-color:var(--montana)}
  .cont-ends{display:flex;justify-content:space-between;font-size:12px;font-weight:700;margin-top:4px}
  .cont-ends .l{color:var(--latigo-d)}.cont-ends .a{color:var(--amor-d)}
  .cont-val{text-align:center;font-family:var(--serif);font-size:15px;margin-top:8px;font-weight:600}

  /* Pirámide */
  .pyr{display:flex;flex-direction:column;align-items:center;margin:8px 0}
  .pyr-band{border:0;cursor:pointer;font-family:inherit;color:#fff;font-weight:600;text-align:center;padding:9px 8px;margin-bottom:3px;line-height:1.15;transition:filter .15s;position:relative}
  .pyr-band:active{filter:brightness(1.08)}
  .pyr-band .n{font-size:9px;opacity:.85;letter-spacing:.05em;text-transform:uppercase;display:block}
  .pyr-band .t{font-size:13px}
  .pyr-explain{margin-top:12px;border-radius:12px;border:1px solid var(--linia);background:var(--card);padding:14px 15px;display:none}
  .pyr-explain.show{display:block;animation:fade .3s ease}
  .pyr-explain h3{font-family:var(--serif);margin:0 0 6px;font-size:17px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:8px}
  @media(max-width:430px){.two{grid-template-columns:1fr}}
  .col{border-radius:12px;padding:12px 13px;font-size:13px;line-height:1.45}
  .col.good{background:var(--amor-lt);border:1px solid #cfe0d4}
  .col.bad{background:var(--latigo-lt);border:1px solid #d3d9de}
  .col h4{margin:0 0 6px;font-size:13.5px}
  .col.good h4{color:var(--amor-d)}.col.bad h4{color:var(--latigo-d)}
  .col ul{margin:0;padding-left:16px}.col li{margin:2px 0}

  /* Historial / registros */
  .rec{background:var(--card);border:1px solid var(--linia);border-radius:12px;padding:11px 13px;margin:9px 0}
  .rec .rh{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .rec .rt{font-weight:600;font-size:13.5px}
  .rec .rd{font-size:11.5px;color:var(--suau)}
  .rec .rb{font-size:13px;color:var(--suau);margin-top:5px;line-height:1.5}
  .rec .del{background:none;border:0;color:#b5433a;cursor:pointer;font-size:12.5px;padding:4px}
  .empty{color:var(--suau);font-style:italic;font-size:13.5px;padding:8px 0}

  /* Frases */
  .verb{display:flex;gap:9px;align-items:flex-start;background:var(--amor-lt);border:1px solid #d5e4d9;border-radius:12px;padding:10px 12px;margin:7px 0}
  .verb .vt{flex:1;font-family:var(--serif);font-style:italic;color:var(--amor-d);font-size:15px;line-height:1.4}
  .verb .va{display:flex;gap:4px;flex:0 0 auto}
  .verb .va button{background:none;border:0;cursor:pointer;font-size:15px;padding:3px}
  .fav-on{color:var(--oro)}
  .grp-t{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--montana-d);font-weight:700;margin:14px 0 4px}

  /* Charts */
  .chart{width:100%;height:auto;display:block;margin:6px 0}
  .chart-lbl{font-size:11px;color:var(--suau);text-align:center;margin-bottom:8px}

  /* Bottom nav */
  .nav{position:fixed;bottom:0;left:0;right:0;z-index:45;background:var(--card);border-top:1px solid var(--linia);display:flex;padding:6px 4px calc(6px + env(safe-area-inset-bottom));max-width:640px;margin:0 auto}
  .tab{flex:1;background:none;border:0;cursor:pointer;font-family:inherit;color:var(--suau);display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;font-size:10px;font-weight:600;border-radius:10px}
  .tab .te{font-size:19px}
  .tab.on{color:var(--montana-d)}
  .tab.on .te{transform:translateY(-1px)}

  /* Modal */
  .modal{position:fixed;inset:0;z-index:60;background:rgba(20,18,14,.55);display:none;align-items:flex-end;justify-content:center;padding:0}
  .modal.show{display:flex;animation:fade .2s ease}
  .sheet{background:var(--card);width:100%;max-width:640px;border-radius:18px 18px 0 0;padding:20px 17px calc(22px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto}
  .sheet h2{font-family:var(--serif);margin:0 0 4px;font-size:19px}
  footer{text-align:center;color:var(--suau);font-size:12px;margin:26px 0 10px;line-height:1.5}
  footer b{font-family:var(--serif);color:var(--montana-d)}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="top">
  <div class="logo">ap</div>
  <div><div class="tt">Pedalea desde dentro</div><div class="ts">APRENS · TEC / AIS · Psicología del deporte</div></div>
  <span class="sp"></span>
  <button class="iconbtn" id="themeBtn" onclick="toggleTheme()" aria-label="Cambiar modo claro/oscuro" title="Modo claro/oscuro">🌙</button>
</div>

<main class="wrap" id="app"></main>

<nav class="nav" id="nav"></nav>

<div class="modal" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="sheet" id="sheet"></div>
</div>

<script src="../js/aprens-core.js"></script>
<script>
"use strict";
/* ============================================================
   PEDALEA DESDE DENTRO · APRENS
   App autónoma para ciclista (Joan) — competir desde la tarea y el
   amor a la bici, acompañar a "Joanet", trabajar la continuidad en
   montaña y la Pirámide de rendimiento (atención → ... → rendimiento).
   Todo local (localStorage). Sin backend ni dependencias externas.
   ============================================================ */

/* ---------- almacenamiento ---------- */
var LS="pedalea_db_v1";
var DEFAULT={
  settings:{joanet:"", joan:"", dark:false,
    valores:["Amar el ciclismo","Ser constante","Cuidar mi cuerpo","Competir con valentía","Aprender"],
    direccion:"Doy lo mejor sin maltratarme y cuido mi relación con la bicicleta, aunque el resultado no dependa de mí.",
    favFrases:[]},
  entrenos:[], ais:[], latigoamor:[], celebra:[], sinentreno:[], piramide:[], huesca_dias:[],
  huesca_antes:null, huesca_despues:null, frasesUser:[], badges:[]
};
var DB=load();
function load(){ try{var d=JSON.parse(localStorage.getItem(LS)); if(!d) return clone(DEFAULT);
  // merge por si faltan claves nuevas
  var base=clone(DEFAULT); for(var k in d){ base[k]=d[k]; } for(var s in DEFAULT.settings){ if(base.settings[s]===undefined) base.settings[s]=DEFAULT.settings[s]; } return base;
  }catch(e){ return clone(DEFAULT); } }
function save(){ try{localStorage.setItem(LS,JSON.stringify(DB));}catch(e){} }
function clone(o){return JSON.parse(JSON.stringify(o));}

/* ---------- utilidades ---------- */
function esc(s){return String(s==null?"":s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function uid(){return Date.now().toString(36)+Math.floor(Math.random()*1e6).toString(36);}
function hoy(){var d=new Date();return d.getFullYear()+"-"+p2(d.getMonth()+1)+"-"+p2(d.getDate());}
function p2(n){return ("0"+n).slice(-2);}
function nowHM(){var d=new Date();return p2(d.getHours())+":"+p2(d.getMinutes());}
function fechaLarga(iso){ if(!iso) return ""; var p=iso.split("-"); var m=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"]; return parseInt(p[2],10)+" "+m[parseInt(p[1],10)-1]+" "+p[0]; }
function JOANET(){return (DB.settings.joanet||"").trim()||"mi cuerpo";}
function JOAN(){return (DB.settings.joan||"").trim();}
function media(arr,f){ var v=arr.map(function(x){return typeof f==="function"?f(x):x[f];}).filter(function(n){return typeof n==="number"&&!isNaN(n);}); if(!v.length) return null; return Math.round(v.reduce(function(a,b){return a+b;},0)/v.length*10)/10; }
function ultimos(arr,n){ return arr.slice().sort(function(a,b){return (b.ts||0)-(a.ts||0);}).slice(0,n||50); }
function daysAgo(n){ var d=new Date(); d.setDate(d.getDate()-n); return d.getFullYear()+"-"+p2(d.getMonth()+1)+"-"+p2(d.getDate()); }
function within7(iso){ return iso>=daysAgo(6); }

/* Integración con el ecosistema APRENS: guardamos también en el aprens_db
   compartido (registro unificado del paciente), pero NO montamos la barra
   flotante de export para no chocar con la navegación inferior propia.
   La exportación de esta herramienta vive en su vista «Datos y ajustes». */
function aprensSave(rec){ if(window.Aprens){ try{ Aprens.save(rec); }catch(e){} } }
if(window.Aprens){ try{ Aprens.config({toolId:"pedalea_desde_dentro", toolName:"Pedalea desde dentro", toolVersion:1}); }catch(e){} }

/* ---------- constructor de formularios ---------- */
/* field: {k,l,t:'scale'|'text'|'num'|'textarea'|'time'|'select'|'chips'|'chips1'|'options', opts, hint, ends, min, max, ph} */
function fieldHTML(f){
  var id="f_"+f.k, h='<div class="fld" data-k="'+f.k+'" data-t="'+f.t+'">';
  h+='<label for="'+id+'">'+esc(f.l)+(f.hint?'<span class="hint">'+esc(f.hint)+'</span>':'')+'</label>';
  if(f.t==='scale'){
    var min=f.min==null?0:f.min, max=f.max==null?10:f.max;
    h+='<div class="scale" role="group" aria-label="'+esc(f.l)+'">';
    for(var i=min;i<=max;i++) h+='<button type="button" class="scaleb" data-v="'+i+'" onclick="pickScale(this)">'+i+'</button>';
    h+='</div>';
    if(f.ends) h+='<div class="scale-ends"><span>'+esc(f.ends[0])+'</span><span>'+esc(f.ends[1])+'</span></div>';
  } else if(f.t==='text'){ h+='<input type="text" id="'+id+'" placeholder="'+esc(f.ph||"")+'">';
  } else if(f.t==='num'){ h+='<input type="number" id="'+id+'" placeholder="'+esc(f.ph||"")+'" inputmode="numeric">';
  } else if(f.t==='time'){ h+='<input type="time" id="'+id+'" value="'+nowHM()+'">';
  } else if(f.t==='textarea'){ h+='<textarea id="'+id+'" placeholder="'+esc(f.ph||"")+'"></textarea>';
  } else if(f.t==='select'){ h+='<select id="'+id+'"><option value="">Elige…</option>'; f.opts.forEach(function(o){h+='<option value="'+esc(o)+'">'+esc(o)+'</option>';}); h+='</select>';
  } else if(f.t==='chips'||f.t==='chips1'){ h+='<div class="chips" data-multi="'+(f.t==='chips'?1:0)+'">'; f.opts.forEach(function(o){h+='<button type="button" class="chip" data-v="'+esc(o)+'" onclick="pickChip(this)">'+esc(o)+'</button>';}); h+='</div>';
  } else if(f.t==='options'){ f.opts.forEach(function(o){h+='<button type="button" class="opt" data-v="'+esc(o)+'" onclick="pickOpt(this)">'+esc(o)+'</button>';}); }
  h+='</div>'; return h;
}
function formHTML(fields){ return fields.map(fieldHTML).join(''); }
function pickScale(b){ var box=b.parentNode; box.querySelectorAll('.scaleb').forEach(function(x){x.classList.remove('sel');}); b.classList.add('sel'); box.parentNode.dataset.val=b.dataset.v; }
function pickChip(b){ var box=b.parentNode, multi=box.dataset.multi==='1'; if(!multi){ box.querySelectorAll('.chip').forEach(function(x){x.classList.remove('sel');}); } b.classList.toggle('sel'); }
function pickOpt(b){ var box=b.parentNode; box.querySelectorAll('.opt').forEach(function(x){x.classList.remove('sel');}); b.classList.add('sel'); box.dataset.val=b.dataset.v; }
function readForm(scope){
  var out={};
  scope.querySelectorAll('.fld').forEach(function(fl){
    var k=fl.dataset.k, t=fl.dataset.t, v;
    if(t==='scale'){ v=fl.dataset.val!=null?parseInt(fl.dataset.val,10):null; }
    else if(t==='chips'||t==='chips1'){ v=[].slice.call(fl.querySelectorAll('.chip.sel')).map(function(x){return x.dataset.v;}); if(t==='chips1') v=v[0]||null; }
    else if(t==='options'){ var sel=fl.querySelector('.opt.sel'); v=sel?sel.dataset.v:null; }
    else { var el=fl.querySelector('input,textarea,select'); v=el?el.value.trim():null; if(v==='') v=null; if(t==='num'&&v!=null) v=parseFloat(v); }
    out[k]=v;
  });
  return out;
}
function flash(msg){ var f=document.getElementById('okflash'); if(f){ f.textContent=msg||"Guardado ✓"; f.classList.add('show'); setTimeout(function(){f.classList.remove('show');},2600); } }

/* ============================================================
   VISTAS
   ============================================================ */
var VIEW="home";
var NAV=[

function go(v){ if(aisT){ clearInterval(aisT); aisT=null; } VIEW=v; render(); window.scrollTo(0,0); }
function render(){

    return '<button class="tab '+(VIEW===n.id||(VIEW.indexOf(n.id)===0&&n.id!=="home")?'on':'')+'" onclick="go(\''+n.id+'\')"><span class="te">'+n.e+'</span>'+n.l+'</button>';

function toggleValor(b){ var v=b.dataset.v, i=DB.settings.valores.indexOf(v);

  save(); }
function guardaDireccion(){ DB.settings.direccion=(document.getElementById('dirInput').value||"").trim(); save(); flash("Dirección guardada ✓"); }

function tickAis(){ var clock=document.getElementById('aisClock'); if(!clock){ if(aisT){clearInterval(aisT);aisT=null;} return; }

function copiarResumen(btn){
  var e7=DB.entrenos.filter(function(x){return within7(x.date);});
  var mont=e7.filter(function(x){return x.montana;});
  var la7=DB.latigoamor.filter(function(x){return within7(x.date);});
  var L=['PEDALEA DESDE DENTRO · '+(JOAN()?JOAN()+' · ':'')+'semana '+fechaLarga(daysAgo(6))+' → '+fechaLarga(hoy())];
  L.push('Entrenos: '+e7.length+' · AIS: '+DB.ais.filter(function(x){return within7(x.date);}).length+' · subidas de montaña: '+mont.length);
  var mp=media(e7,'presion'), md=media(e7,'disfrute'), mc=media(e7,'conexion'), cm=media(mont,'cont_min'), mla=media(la7,'nivel');
  if(mp!=null) L.push('Presión por demostrar (media): '+mp+'/10');
  if(md!=null) L.push('Disfrute (media): '+md+'/10');
  if(mc!=null) L.push('Conexión con la bici (media): '+mc+'/10');
  if(cm!=null) L.push('Continuidad en montaña (media): '+cm+'/10');
  if(mla!=null) L.push('Látigo(0)–amor firme(10) (media): '+mla+'/10');
  var vueltas=mont.filter(function(x){return x.foco_vuelta&&x.foco_vuelta!=='No lo logré';}).length;
  L.push('Veces que volvió a la tarea en subida: '+vueltas+'/'+mont.length);

}

function exportJSON(){ downloadFile('pedalea_'+hoy()+'.json', JSON.stringify(DB,null,2), 'application/json'); }
function exportCSV(){
  var rows=[['modulo','fecha','hora','clave','valor']];
  function push(mod,rec){ for(var k in rec){ if(['id','ts'].indexOf(k)>=0) continue; var v=rec[k]; if(Array.isArray(v)) v=v.join(' | '); rows.push([mod,rec.date||'',rec.hora||'',k,String(v==null?'':v)]); } }
  DB.entrenos.forEach(function(r){push('entreno_'+(r.fase||''),r);}); DB.ais.forEach(function(r){push('ais',r);}); DB.latigoamor.forEach(function(r){push('latigo_amor',r);}); DB.celebra.forEach(function(r){push('celebrar',r);}); DB.piramide.forEach(function(r){push('piramide',r);}); DB.huesca_dias.forEach(function(r){push('huesca_dia',r);});
  var csv=rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  downloadFile('pedalea_'+hoy()+'.csv', csv, 'text/csv');
}
function downloadFile(name,content,type){ try{ var blob=new Blob([content],{type:type}); var url=URL.createObjectURL(blob); var a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click(); document.body.removeChild(a); setTimeout(function(){URL.revokeObjectURL(url);},1000); flash("Archivo generado ✓"); }catch(e){ alert('No se pudo generar el archivo.'); } }
function importJSON(ev){ var file=ev.target.files[0]; if(!file) return; var r=new FileReader(); r.onload=function(){ try{ var d=JSON.parse(r.result); if(!d.settings) throw 0; if(confirm('¿Reemplazar los datos actuales por los del archivo?')){ DB=d; save(); render(); go('datos'); flash("Datos importados ✓"); } }catch(e){ alert('Archivo no válido.'); } }; r.readAsText(file); ev.target.value=''; }

    DB.entrenos.push({id:uid(),ts:base-i*86400000,date:dt,hora:'18:00',fase:'montana',montana:true,tipo:'Montaña',cont_min:4+((i*3)%6),int_max:7+(i%3),acomp:['Látigo','Mezcla','Amor y firmeza'][i%3],foco_vuelta:'Cadencia',espera:5+i});
    if(i%2===0) DB.ais.push({id:uid(),ts:base-i*86400000+3600000,date:dt,dur:60,amenaza_ini:7,amenaza_fin:5,dispo_fin:7});
    DB.latigoamor.push({id:uid(),ts:base-i*86400000+7200000,date:dt,nivel:3+((i*2)%7),latigo:'aprieta o no vales',amor:'esto duele y sigo contigo, a la cadencia'});
  }
  save(); render(); go('datos'); flash("Datos demo cargados ✓");
}
function resetAll(){ if(confirm('¿Seguro que quieres borrar TODO?')){ if(confirm('Esta acción no se puede deshacer. ¿Confirmas?')){ DB=clone(DEFAULT); save(); render(); go('home'); } } }

/* ---------------- helpers compartidos ---------------- */
function chartCard(title,vals){ return '<div class="card"><div class="chart-lbl">'+esc(title)+'</div>'+barChart(vals)+(vals.length?'':'<p class="empty">Sin datos todavía.</p>')+'</div>'; }
function barChart(vals){ if(!vals.length) return ''; var W=320,H=90,n=vals.length,bw=W/n,max=10;
  var s='<svg class="chart" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet" role="img" aria-label="gráfica de barras">';
  s+='<line x1="0" y1="'+(H-14)+'" x2="'+W+'" y2="'+(H-14)+'" stroke="var(--linia2)" stroke-width="1"/>';
  vals.forEach(function(v,i){ var h=(v/max)*(H-24); var x=i*bw+bw*0.18, y=(H-14)-h; s+='<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+(bw*0.64).toFixed(1)+'" height="'+h.toFixed(1)+'" rx="2" fill="var(--montana)"/>'; s+='<text x="'+(i*bw+bw/2).toFixed(1)+'" y="'+(H-3)+'" font-size="8" text-anchor="middle" fill="var(--suau)">'+v+'</text>'; });
  s+='</svg>'; return s; }
function recientes(arr,fmt,emptyMsg){ var list=ultimos(arr,6); if(!list.length) return '<div class="card"><p class="empty">'+esc(emptyMsg||'Sin registros.')+'</p></div>';
  return '<div class="card"><h2>Últimos registros</h2>'+list.map(function(x){ return '<div class="rec"><div class="rh"><span class="rt">'+esc(fechaLarga(x.date))+(x.hora?' · '+esc(x.hora):'')+'</span><button class="del" onclick="delRec(\''+recStore(arr)+'\',\''+x.id+'\')">borrar</button></div><div class="rb">'+esc(fmt(x))+'</div></div>'; }).join('')+'</div>'; }
function recStore(arr){ if(arr===DB.entrenos) return 'entrenos'; if(arr===DB.ais) return 'ais'; if(arr===DB.latigoamor) return 'latigoamor'; if(arr===DB.celebra) return 'celebra'; if(arr===DB.piramide) return 'piramide'; if(arr===DB.sinentreno) return 'sinentreno'; return ''; }
function delRec(store,id){ if(!store||!DB[store]) return; if(confirm('¿Borrar este registro?')){ DB[store]=DB[store].filter(function(x){return x.id!==id;}); save(); render(); } }
function addBadge(name){ if(DB.badges.indexOf(name)<0) DB.badges.push(name); }
function footerHTML(){ return '<footer><b>APRENS</b> · Pedalea desde dentro<br>Material de apoyo terapéutico (TEC/AIS · psicología del deporte). Se interpreta dentro de tu proceso en sesión.<br>No sustituye atención médica. Ante síntomas preocupantes, detente y consulta.</footer>'; }
function copiar(txt,btn){ txt=String(txt).replace(/\\'/g,"'");
  function ok(){ if(btn){ var o=btn.textContent; btn.textContent='✓'; setTimeout(function(){btn.textContent=o;},1400); } }
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(ok).catch(function(){fb();}); } else { fb(); }
  function fb(){ var ta=document.createElement('textarea'); ta.value=txt; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');ok();}catch(e){} document.body.removeChild(ta); }
}
function toggleTheme(){ DB.settings.dark=!DB.settings.dark; applyTheme(); save(); }
function applyTheme(){ document.documentElement.setAttribute('data-theme', DB.settings.dark?'dark':'light'); var b=document.getElementById('themeBtn'); if(b) b.textContent=DB.settings.dark?'☀️':'🌙'; }
function closeModal(){ document.getElementById('modal').classList.remove('show'); }

/* ---------------- init ---------------- */
applyTheme();
render();
</script>
