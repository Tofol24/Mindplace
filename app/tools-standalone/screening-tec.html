<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{--azul:#1B4F8C;--azulLt:#D6E4F0;--verde:#2E7D5E;--verdeLt:#D4EDDA;--naranja:#E07B39;--rojo:#C0392B;--gris:#6B7280;--fondo:#F0F4F8;--lila:#7B4FC1;}
  body{font-family:'DM Sans',sans-serif;background:var(--fondo);color:#1a1a2e;min-height:100vh;}
  .header{background:var(--azul);color:#fff;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(27,79,140,.3);position:sticky;top:0;z-index:50;}
  .hbrand{display:flex;align-items:center;gap:11px;}
  .hlogo{width:36px;height:36px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--azul);font-size:12px;font-family:'Playfair Display',serif;}
  .htitle{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;}
  .hsub{font-size:10px;opacity:.75;margin-top:1px;}
  .hbadge{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 13px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;}
  .hbadge.px{background:rgba(46,125,94,.5);}
  .wrap{max-width:880px;margin:0 auto;padding:26px 18px 70px;}
  .btn{border:none;border-radius:30px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:7px;text-decoration:none;}
  .bp{background:var(--azul);color:#fff;padding:13px 28px;font-size:14px;box-shadow:0 4px 14px rgba(27,79,140,.3);}
  .bp:hover{opacity:.9;}
  .bpg{background:var(--verde);color:#fff;padding:13px 28px;font-size:14px;box-shadow:0 4px 14px rgba(46,125,94,.3);}
  .bpg:hover{opacity:.9;}
  .bs{background:#fff;color:var(--azul);border:2px solid var(--azul);padding:11px 22px;font-size:13px;}
  .bs:hover{background:var(--azulLt);}
  .bsm{padding:8px 16px;font-size:13px;}
  .bwa{background:#25D366;color:#fff;padding:14px 24px;font-size:15px;box-shadow:0 4px 14px rgba(37,211,102,.3);}
  .bmail{background:#EA4335;color:#fff;padding:14px 24px;font-size:15px;}
  .bcopy{background:#fff;color:var(--gris);border:2px solid #E0E7EF;padding:12px 20px;font-size:14px;}
  .card{background:#fff;border-radius:16px;padding:26px;box-shadow:0 2px 10px rgba(0,0,0,.06);margin-bottom:18px;}
  .ctit{font-weight:600;font-size:13px;color:var(--azul);margin-bottom:14px;text-transform:uppercase;letter-spacing:.5px;}

  .htitulo{font-family:'Playfair Display',serif;font-size:25px;color:var(--azul);margin-bottom:6px;}
  .hsubt{color:var(--gris);font-size:14px;line-height:1.65;}
  .frase-rectora{font-style:italic;color:var(--azul);font-size:13px;background:var(--azulLt);border-radius:0 10px 10px 0;border-left:4px solid var(--azul);padding:12px 16px;line-height:1.55;margin-top:14px;}
  .selector{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:22px;}
  .mcard{display:block;width:100%;background:#fff;border-radius:16px;padding:30px 24px;border:3px solid #E8EFF7;cursor:pointer;transition:all .2s;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.06);font-family:inherit;-webkit-appearance:none;}
  @media(hover:hover){.mcard:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(27,79,140,.15);}.mcard.cli:hover{border-color:var(--azul);}.mcard.px:hover{border-color:var(--verde);}}
  .mcard:active{transform:scale(.98);}
  .mico{font-size:42px;margin-bottom:12px;}
  .mtit{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-bottom:8px;}
  .mdesc{font-size:13px;color:var(--gris);line-height:1.6;}
  .mtag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;margin-top:13px;}
  .aviso{background:var(--azulLt);border-left:4px solid var(--azul);border-radius:0 10px 10px 0;padding:13px 16px;font-size:12.5px;color:var(--azul);line-height:1.6;margin-bottom:20px;}

  .qprog-f{height:100%;background:var(--azul);border-radius:3px;transition:width .4s;}
  .qmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
  .qbadge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;}
  .qnum{color:var(--gris);font-size:13px;}
  .qtxt{font-size:17px;line-height:1.6;margin-bottom:28px;min-height:64px;}
  .qlabels{display:flex;justify-content:space-between;font-size:11px;color:var(--gris);padding:0 2px;margin-bottom:10px;}
  .qbtns{display:flex;gap:5px;}
  .qb{flex:1;aspect-ratio:1;border-radius:9px;border:2px solid #E8EFF7;background:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:all .12s;color:#444;display:flex;align-items:center;justify-content:center;}

  .qnav{display:flex;justify-content:space-between;align-items:center;margin-top:22px;}
  .qdots{display:flex;gap:3px;flex-wrap:wrap;max-width:50%;}
  .qdot{width:7px;height:7px;border-radius:50%;background:#E8EFF7;}
  .qdot.on{background:var(--azul);}
  .ipt{display:block;width:100%;border:2px solid #E8EFF7;border-radius:10px;padding:13px 15px;font-family:'DM Sans',sans-serif;font-size:16px;outline:none;margin-bottom:10px;-webkit-appearance:none;background:#fff;color:#111;}
  .ipt:focus{border-color:var(--azul);}
  .lbl{font-size:13px;font-weight:600;color:#333;margin-bottom:6px;display:block;}

  .acc{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:16px;}
  .form-result{background:var(--azul);color:#fff;border-radius:16px;padding:26px;margin-bottom:18px;}
  .fr-row{margin-bottom:14px;}
  .fr-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.6px;opacity:.75;margin-bottom:3px;}
  .fr-val{font-size:15px;font-weight:600;line-height:1.4;}
  .ice-bars{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
  .ice-c{background:#fff;border-radius:13px;padding:18px 14px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.06);}
  .ice-ic{font-size:18px;margin-bottom:5px;}
  .ice-v{font-size:28px;font-weight:700;font-family:'Playfair Display',serif;}
  .ice-n{font-size:11px;color:var(--gris);font-weight:500;}
  .ice-b{height:5px;background:#E8EFF7;border-radius:3px;margin-top:8px;overflow:hidden;}
  .ice-f{height:100%;border-radius:3px;}
  .pat-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:11px;border:2px solid #E8EFF7;margin-bottom:7px;}
  .pat-row.dom{border-color:var(--verde);background:#F4FBF6;}
  .pat-row.sec{border-color:var(--azul);background:#FAFCFF;}
  .pat-ic{font-size:20px;flex-shrink:0;}
  .pat-info{flex:1;}
  .pat-nm{font-weight:600;font-size:14px;}
  .pat-bar{height:6px;background:#E8EFF7;border-radius:3px;margin-top:5px;overflow:hidden;}
  .pat-bf{height:100%;border-radius:3px;}
  .pat-sc{font-size:13px;font-weight:700;color:var(--azul);min-width:34px;text-align:right;}
  .pat-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px;}
  .codigo-perfil{background:var(--verde);color:#fff;border-radius:14px;padding:22px;text-align:center;margin-bottom:18px;}
  .cp-num{font-family:'Playfair Display',serif;font-size:46px;font-weight:700;letter-spacing:6px;margin:8px 0;}
  .pauta-box{background:var(--verdeLt);border-left:4px solid var(--verde);border-radius:0 12px 12px 0;padding:18px 20px;font-size:14px;line-height:1.7;color:#1a4a30;}
  .pac-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:10px;border:2px solid #E8EFF7;margin-bottom:8px;}
  @media(hover:hover){.pac-row:hover{border-color:var(--azul);background:#FAFCFF;}}
  .pac-info{display:flex;align-items:center;gap:12px;cursor:pointer;flex:1;}
  .pac-info:active{opacity:.6;}
  .pac-av{width:40px;height:40px;border-radius:50%;background:var(--azul);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
  .pac-nm{font-weight:600;font-size:15px;}
  .pac-sub{font-size:12px;color:var(--gris);margin-top:1px;}
  .pac-del{background:none;border:none;font-size:18px;cursor:pointer;padding:6px 10px;border-radius:8px;opacity:.5;}
  @media(hover:hover){.pac-del:hover{opacity:1;background:#FEE2E2;}}
  .pill{display:inline-block;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;margin:3px;}
  .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal-bx{background:#fff;border-radius:16px;max-width:400px;width:100%;padding:26px;box-shadow:0 10px 40px rgba(0,0,0,.3);}
  .empty{text-align:center;padding:50px 20px;color:var(--gris);}
  .empty h3{font-family:'Playfair Display',serif;font-size:19px;margin-bottom:8px;color:#444;}
  @media(max-width:600px){.selector{grid-template-columns:1fr;}.ice-bars{grid-template-columns:1fr;}.qbtns{flex-wrap:wrap;}.qb{min-width:calc(20% - 5px);}}

<script>
// ═══ MOTOR ICE (transversal, todos los pacientes) ═══
// inv:true => puntuación alta del ítem = PEOR (se invierte para que alto=mejor regulación)
const ICE={
  L:{nombre:"Latencia",icon:"⏱",desc:"Espacio entre activación interna e impulso de respuesta",items:[
    {id:"L1",inv:true,t:"Reacciono antes de darme cuenta de lo que estoy haciendo."},
    {id:"L2",inv:true,t:"Me cuesta hacer una pausa antes de contestar o actuar."},
    {id:"L3",inv:true,t:"Cuando algo me activa, necesito resolverlo inmediatamente."},
    {id:"L4",inv:false,t:"Puedo respirar y esperar unos segundos antes de actuar."},
    {id:"L5",inv:false,t:"Puedo notar el impulso sin obedecerlo enseguida."},
  ]},
  D:{nombre:"Densidad",icon:"🌊",desc:"Carga y mezcla de microoscilaciones internas",items:[
    {id:"D1",inv:true,t:"Mi estado interno cambia muchas veces a lo largo del día."},
    {id:"D2",inv:true,t:"Paso rápido de preocupación a irritación, tristeza o bloqueo."},
    {id:"D3",inv:true,t:"Tengo muchas microtensiones internas aunque desde fuera no se note."},
    {id:"D4",inv:true,t:"Me cuesta saber qué siento porque todo aparece mezclado."},
    {id:"D5",inv:true,t:"Mi cuerpo está en alerta aunque no haya una amenaza clara."},
  ]},
  C:{nombre:"Continuidad",icon:"🔗",desc:"Sostener atención, presencia y dirección sin fragmentarse",items:[
    {id:"C1",inv:true,t:"Me cuesta sostener una tarea sin desconectarme."},
    {id:"C2",inv:true,t:"Me cuesta mantener una conversación estando presente."},
    {id:"C3",inv:true,t:"Empiezo cosas y salto a otras sin cerrarlas."},
    {id:"C4",inv:true,t:"Cuando intento sentir el cuerpo, enseguida me voy al pensamiento."},
    {id:"C5",inv:false,t:"Puedo sostener la atención en pecho, cuello o estómago durante unos segundos."},
  ]},
};

// ═══ 6 PATRONES DE VECTOR ATENCIONAL ═══
// Cada ítem 0-10: mayor valor = mayor presencia del patrón
const PATRONES={
  AP:{n:1,id:"AP",nombre:"Ansioso-preocupativo",icon:"🌀",color:"#E07B39",
    desc:"Vector al futuro, anticipación, búsqueda de certeza, sobrepensamiento como control",
    items:[
      {id:"AP1",t:"Mi atención se va al futuro intentando anticipar problemas."},
      {id:"AP2",t:"Cuando aparece una sensación interna, mi mente busca una solución aunque no haya nada concreto que resolver."},
      {id:"AP3",t:"Me cuesta diferenciar entre pensar de forma útil y sobrepensar para calmarme."},
      {id:"AP4",t:"Siento que si dejo de preocuparme, algo malo puede pasar."},
      {id:"AP5",t:"Me cuesta actuar con normalidad hasta sentir que tengo el control."},
    ]},
  RD:{n:2,id:"RD",nombre:"Rumiativo-depresivo",icon:"🌫️",color:"#4A7FC1",
    desc:"Vector al pasado, culpa, pérdida, frustración, colapso del vector de acción",
    items:[
      {id:"RD1",t:"Mi atención vuelve al pasado buscando errores, culpa o explicaciones."},
      {id:"RD2",t:"Siento que he intentado controlar mi malestar y, al no conseguirlo, me he ido apagando."},
      {id:"RD3",t:"Las actividades que antes tenían sentido ahora me generan rechazo o indiferencia."},
      {id:"RD4",t:"Me cuesta iniciar conductas aunque sepa que me ayudarían."},
      {id:"RD5",t:"Mi cuerpo evita situaciones cotidianas porque las asocia con malestar."},
    ]},
  HS:{n:3,id:"HS",nombre:"Hipervigilante-somático",icon:"🫀",color:"#C0392B",
    desc:"Sensación corporal como amenaza, miedo al síntoma, fusión sensación = peligro",
    items:[
      {id:"HS1",t:"Mi atención se fija en síntomas corporales o señales de peligro."},
      {id:"HS2",t:"Cuando aparece una sensación física, mi atención queda atrapada en esa zona."},
      {id:"HS3",t:"Me cuesta distinguir entre sentir una sensación y estar en peligro."},
      {id:"HS4",t:"Evito movimientos o actividades por miedo a que el cuerpo empeore."},
      {id:"HS5",t:"Me cuesta acompañar una sensación sin intentar cambiarla de inmediato."},
    ]},
  CE:{n:4,id:"CE",nombre:"Compulsivo-evitativo",icon:"🔁",color:"#7B4FC1",
    desc:"Neutralización, comprobación, evitación, control externo, alivio inmediato",
    items:[
      {id:"CE1",t:"Cuando noto malestar, necesito hacer algo rápido para aliviarlo."},
      {id:"CE2",t:"Hago comprobaciones o repito acciones para reducir la inquietud."},
      {id:"CE3",t:"Evito situaciones que me generan incertidumbre o que no puedo controlar."},
      {id:"CE4",t:"Pospongo cosas para no enfrentar el malestar que me generan."},
      {id:"CE5",t:"Necesito seguridad externa (preguntar, confirmar) para quedarme tranquilo/a."},
    ]},
  BD:{n:5,id:"BD",nombre:"Bloqueo-desactivación",icon:"🌑",color:"#6B7280",
    desc:"Apagamiento, abulia, desconexión, retirada, pérdida de iniciativa",
    items:[
      {id:"BD1",t:"Mi atención se va hacia la desconexión: me quedo en blanco o ausente."},
      {id:"BD2",t:"Ante el malestar, mi respuesta es apagarme o retirarme."},
      {id:"BD3",t:"Pierdo la iniciativa y me cuesta arrancar incluso cosas pequeñas."},
      {id:"BD4",t:"Siento el cuerpo pesado, sin energía para dirigir la acción."},
      {id:"BD5",t:"Me desconecto de lo que siento para no tener que gestionarlo."},
    ]},
  ID:{n:6,id:"ID",nombre:"Impulsivo-disperso",icon:"⚡",color:"#1B9E8A",
    desc:"Estímulo inmediato, baja continuidad, salto atencional, búsqueda dopaminérgica",
    items:[

      {id:"ID2",t:"Busco estímulos inmediatos (móvil, comida, movimiento) cuando algo me incomoda."},

      {id:"ID4",t:"Mi mente va más rápido que mi capacidad de ordenar la acción."},
      {id:"ID5",t:"Me cuesta sostener una conducta si no hay una recompensa próxima."},
    ]},

const PORDEN=["AP","RD","HS","CE","ID","BD"]; // orden por nº de patrón (n=1..6) reordenado abajo
const PAT_BY_N={1:"AP",2:"RD",3:"HS",4:"CE",5:"BD",6:"ID"};
// Conducta de alivio (dígito 3)
const ALIVIO={1:"Evitación",2:"Comprobación / neutralización",3:"Posposición",4:"Aislamiento",5:"Sobrepensamiento",6:"Impulsividad / estímulo inmediato",7:"Bloqueo / no acción",8:"Búsqueda de seguridad externa"};
const ICE_DIG={1:"Latencia",2:"Densidad",3:"Continuidad"};

// ═══ 8 MÓDULOS TERAPÉUTICOS (4ª cifra) ═══
// Contenido literal de la documentación del proyecto. prof = lectura clínica; pac = texto para el paciente (mensaje del terapeuta).
const MODULOS={
  1:{nombre:"AIS basal",
     prof:"El paciente usa AIS sobre todo como respuesta al malestar o como intento de control. Objetivo: entrenar presencia interna aunque no haya malestar, para que el cuerpo aprenda que la conciencia está disponible sin exigirle cambiar.",
     pac_titulo:"Entrenar la presencia interna sin esperar a estar mal",
     pac_por:"He visto en tus registros que estás usando la respiración y la atención al cuerpo sobre todo cuando ya estás mal. Esta semana quiero que cambiemos eso: vamos a entrenar la presencia cuando NO hace falta, para que tu cuerpo aprenda que estás disponible para él sin tener que cambiar nada.",
     pac_consigna:"No practico para quitarme nada. Practico para que mi cuerpo sepa que estoy aquí.",
     pac_tarea:"Cada 2 horas aproximadamente: una respiración diafragmática y lleva la atención a pecho, estómago o cuello durante 10-20 segundos. No busques sentir nada concreto. Anota simplemente: he estado presente aunque no hiciera falta."},
  2:{nombre:"Ampliación de latencia",
     prof:"Reacción rápida, impulsividad, evitación inmediata o necesidad urgente de resolver. Objetivo: aumentar el espacio entre activación interna y respuesta.",
     pac_titulo:"Ganar unos segundos antes de responder",
     pac_por:"Tu cuerpo tiende a reaccionar muy rápido, antes de que puedas elegir. No se trata de responder mejor de golpe, sino de ganar unos segundos antes de actuar.",
     pac_consigna:"Mi tarea no es responder mejor de golpe. Mi tarea es ganar unos segundos antes de responder.",
     pac_tarea:"Cuando notes activación: párate, di mentalmente STOP, respira, localiza la sensación en el cuerpo y espera 10 segundos antes de hablar, actuar, escribir o decidir."},
  3:{nombre:"Activación con valores y tiempo límite",
     prof:"Bloqueo, abulia, posposición o rumiación con pérdida de acción. Objetivo: pasar de pensar/esperar ganas a iniciar una conducta mínima con sentido.",
     pac_titulo:"Empezar pequeño, sin esperar las ganas",
     pac_por:"Tu cuerpo tiende a apagarse o bloquearse cuando aparece malestar. No vamos a esperar a que aparezcan ganas. Vamos a enseñarle al cuerpo que puede empezar poco a poco, con presencia y sin exigencia.",
     pac_consigna:"No necesito estar bien para empezar. Empiezo pequeño para que mi cuerpo vuelva a confiar.",
     pac_tarea:"Elige una acción mínima diaria y ponle hora límite (ej: a las 10:30 empiezo durante 5 minutos). Antes de empezar: una respiración y atención al cuerpo. Después anota solo si lo iniciaste, no si salió perfecto."},
  4:{nombre:"Reducción de sobrepensamiento",

// Regla base: módulo inicial según código de 3 cifras (cuando aún no hay seguimientos)
function moduloBase(a){
  const dom=a.dominante, ice=a.iceAlt, ali=a.alivioDig;
  // Prioridad clínica derivada de la documentación
  if(dom==="HS") return 6;
  if(dom==="ID") return 7;
  if(dom==="CE") return (ali===2)?4:2;
  if(dom==="AP") return 4;
  if(dom==="RD") return 3;
  if(dom==="BD") return 3;
  if(ice==="L") return 2;
  if(ice==="C") return 7;
  return 1;
}
// Por evolución: recalcula módulo prioritario según los últimos seguimientos
function moduloEvolucion(seg, a, contexto){
  if(!seg||!seg.length) return {mod:moduloBase(a), motivo:"Módulo inicial según la formulación base (aún sin registros de seguimiento)."};
  const ult=seg.slice(-3); // últimos 3 registros
  const prom=(f)=>{const v=ult.map(s=>s.score[f]).filter(x=>x!=null);return v.length?v.reduce((p,c)=>p+c,0)/v.length:null;};
  const aisB=prom("aisBasal"), aisR=prom("aisReactivo"), lat=prom("latencia"), cont=prom("continuidad"), val=prom("valores");
  // sobrepensamiento e activación: derivamos de resp S2 y S1 (más alto crudo = peor)
  const sob=(()=>{const v=ult.map(s=>s.resp&&s.resp.S2!=null?s.resp.S2:null).filter(x=>x!=null);return v.length?v.reduce((p,c)=>p+c,0)/v.length:null;})();
  const hon=prom("aisBasal"); // placeholder no usado
  const honest=(()=>{const v=ult.map(s=>s.resp&&s.resp.S10!=null?s.resp.S10:null).filter(x=>x!=null);return v.length?v.reduce((p,c)=>p+c,0)/v.length:null;})();
  const activ=(()=>{const v=ult.map(s=>s.score&&s.score.activacion!=null?s.score.activacion:null).filter(x=>x!=null);return v.length?v.reduce((p,c)=>p+c,0)/v.length:null;})();
  // Reglas por evolución (orden de prioridad clínica del documento)
  if(aisB!=null&&aisR!=null&&aisR>aisB) return {mod:1,motivo:"El AIS se está usando más como respuesta al malestar que como entrenamiento basal. Prioridad: reinstaurar la práctica basal."};
  if(lat!=null&&lat<5) return {mod:2,motivo:"La latencia sigue baja: el sistema responde antes de poder elegir. Prioridad: ampliar el espacio antes de la respuesta."};
  if(val!=null&&val<5 && (a.dominante==="RD"||a.dominante==="BD")) return {mod:3,motivo:"Conducta con valor baja con tendencia al bloqueo. Prioridad: activación con tiempo límite."};
  if(sob!=null&&sob>=3) return {mod:4,motivo:"Sobrepensamiento elevado en los últimos registros. Prioridad: diferenciar pensar de control."};
  if(honest!=null&&honest<5) return {mod:5,motivo:"Honestidad emocional baja. Prioridad: nombrar la sensación desde el cuerpo en el vínculo."};
  if(activ!=null&&activ<5 && a.dominante==="HS") return {mod:6,motivo:"Activación corporal alta con vector somático. Prioridad: exposición interoceptiva compasiva."};
  if(cont!=null&&cont<5) return {mod:7,motivo:"Continuidad atencional baja sostenida. Prioridad: sostener dirección en bloques cortos."};
  if(contexto && /pareja|familiar|crianza/i.test(contexto)) return {mod:8,motivo:"Contexto vincular con reactividad. Prioridad: regulación vincular antes de responder."};
  return {mod:moduloBase(a),motivo:"Evolución estable; se mantiene el módulo coherente con la formulación base."};
}

const SEG_CUALI="¿Cuál ha sido hoy el momento donde mi cuerpo más necesitaba que mi conciencia estuviera presente?";
function scoreSeg(resp){
  // Cada ítem 0-4. Normalizamos a 0-10 en sentido positivo (alto=mejor).
  const o={};
  SEG_ITEMS.forEach(it=>{const v=resp[it.id];o[it.id]=v===undefined?null:(it.dir<0?(4-v):v);});
  const vals=SEG_ITEMS.map(it=>o[it.id]).filter(v=>v!==null);
  o.indice = vals.length?Math.round((vals.reduce((a,b)=>a+b,0)/vals.length)*2.5*10)/10:null; // 0-4 -> 0-10
  // Indicadores clave separados (0-10):
  const n=(v)=>v===undefined?null:Math.round(v*2.5*10)/10;
  o.activacion = resp.S1===undefined?null:Math.round((4-resp.S1)*2.5*10)/10;
  o.latencia = n(resp.S4);
  o.continuidad = n(resp.S6);
  o.valores = n(resp.S7);
  o.aisBasal = n(resp.S8);
  o.aisReactivo = n(resp.S9);
  return o;
}

// ═══ SCORING ═══
function scoreICE(p,resp){
  const c=ICE[p];
  const vals=c.items.map(it=>{const v=resp[it.id];return v===undefined?null:(it.inv?(10-v):v);}).filter(v=>v!==null);
  return vals.length?Math.round((vals.reduce((a,b)=>a+b,0)/vals.length)*10)/10:null;
}
function scorePatron(k,resp){
  const c=PATRONES[k];
  const vals=c.items.map(it=>{const v=resp[it.id];return v===undefined?null:v;}).filter(v=>v!==null);
  return vals.length?Math.round((vals.reduce((a,b)=>a+b,0)/vals.length)*10)/10:null;
}
function analizar(resp){
  const ice={L:scoreICE("L",resp),D:scoreICE("D",resp),C:scoreICE("C",resp)};
  // parámetro ICE más alterado = el de menor puntuación (menor = peor regulación)
  let iceAlt="L",mn=99;
  ["L","D","C"].forEach(p=>{ if(ice[p]!==null && ice[p]<mn){mn=ice[p];iceAlt=p;} });
  // patrones ordenados por puntuación desc
  const pl=Object.keys(PATRONES).map(k=>({k,s:scorePatron(k,resp)})).filter(x=>x.s!==null).sort((a,b)=>b.s-a.s);
  const dominante=pl.length?pl[0].k:null;
  // secundarios: patrones con score >= 5 y al menos a 1.0 del dominante o destacados
  const secundarios=pl.slice(1).filter(x=>x.s>=5.0).map(x=>x.k);
  // conducta de alivio predominante: derivada del patrón dominante (mapeo clínico)
  const ALIVIO_POR_PATRON={AP:5,RD:7,HS:2,CE:1,BD:7,ID:6};
  // refinamiento: si CE alto, comprobación; si AP alto, sobrepensamiento; etc.
  let alivioDig=ALIVIO_POR_PATRON[dominante]||1;
  // si hay un secundario CE fuerte, la conducta de alivio puede ser comprobación
  const sCE=pl.find(x=>x.k==="CE"); if(sCE&&sCE.s>=7 && dominante!=="CE") alivioDig=2;
  const iceDig={L:1,D:2,C:3}[iceAlt];
  return {ice,iceAlt,iceDig,patrones:pl,dominante,secundarios,alivioDig};
}

// d1=patrón dominante(1-6) · d2=ICE más alterado(1-3) · d3=conducta alivio(1-8)
function codificar(a){
  const d1=PATRONES[a.dominante].n;
  const d2=a.iceDig;
  const d3=a.alivioDig;
  return ""+d1+d2+d3;
}
function decodificar(code){
  if(!/^\d{3}$/.test(code))return null;
  const d1=+code[0],d2=+code[1],d3=+code[2];
  if(d1<1||d1>6||d2<1||d2>3||d3<1||d3>8)return null;
  return {patron:PAT_BY_N[d1], ice:{1:"L",2:"D",3:"C"}[d2], alivio:d3};
}

// ═══ FORMULACIÓN + PAUTA ═══
function formulacion(a){
  const dom=PATRONES[a.dominante];
  const sec=a.secundarios.map(k=>PATRONES[k].nombre);
  const iceTxt=[];
  if(a.ice.L!==null)iceTxt.push("latencia "+nivel(a.ice.L));
  if(a.ice.D!==null)iceTxt.push("densidad "+nivelInv(a.ice.D));
  if(a.ice.C!==null)iceTxt.push("continuidad "+nivel(a.ice.C));
  return {
    canalPrincipal:dom.nombre,
    canalDesc:dom.desc,
    secundarios:sec,
    iceTxt:iceTxt.join(", "),
    alivio:ALIVIO[a.alivioDig],
  };
}
function nivel(v){ if(v>=7)return "alta"; if(v>=4.5)return "media"; return "baja"; }
function nivelInv(v){ // para densidad: alto score (tras inversión) = baja densidad = buena
  if(v>=7)return "baja"; if(v>=4.5)return "media"; return "alta"; }

function copiar(t){
  const ok=()=>{const m=document.getElementById("okm");if(m){m.textContent="✓ Copiado";m.style.display="block";setTimeout(()=>m.style.display="none",3000);}};
  const fallo=()=>{mostrarCopiaManual(t);};
  // Método 1: API moderna (solo funciona en https:// o localhost)
  if(navigator.clipboard&&navigator.clipboard.writeText&&window.isSecureContext){
    navigator.clipboard.writeText(t).then(ok).catch(()=>met2());
  }else{met2();}
  // Método 2: execCommand (funciona en muchos navegadores incl. file://)
  function met2(){
    try{
      const a=document.createElement("textarea");
      a.value=t;a.style.position="fixed";a.style.top="0";a.style.left="0";a.style.opacity="0";
      document.body.appendChild(a);a.focus();a.select();a.setSelectionRange(0,t.length);
      const exito=document.execCommand("copy");
      document.body.removeChild(a);
      if(exito)ok();else fallo();
    }catch(e){fallo();}
  }
}
function mostrarCopiaManual(t){
  const ov=document.createElement("div");ov.className="modal-ov";
  ov.innerHTML=`<div class="modal-bx" style="max-width:520px">

    <textarea readonly id="cmTa" class="ipt" style="height:90px;font-family:monospace;font-size:13px;-webkit-user-select:all;user-select:all">${t.replace(/</g,"&lt;")}</textarea>
    <div style="display:flex;gap:10px;margin-top:12px;justify-content:center">
      <button class="btn bp bsm" onclick="(function(b){var ta=document.getElementById('cmTa');ta.focus();ta.select();ta.setSelectionRange(0,ta.value.length);try{document.execCommand('copy');}catch(e){}if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(ta.value).catch(function(){});}b.textContent='✓ Copiado';})(this)">📋 Copiar todo</button>
      <button class="btn bs bsm" onclick="this.closest('.modal-ov').remove()">Cerrar</button>
    </div>
    <div style="font-size:11.5px;color:var(--gris);margin-top:12px;line-height:1.5;background:var(--azulLt);border-radius:8px;padding:10px 12px">💡 Para que el copiado y los botones funcionen automáticamente, abre la app desde su dirección web (Netlify), no como archivo descargado.</div>
  </div>`;
  ov.addEventListener("click",e=>{if(e.target===ov)ov.remove();});

  setTimeout(()=>{const ta=document.getElementById("cmTa");if(ta){ta.focus();ta.select();}},100);

function crearPac(){const v=(document.getElementById("np").value||"").trim().toUpperCase();if(!v)return;const db=getDB();if(!db[v])db[v]={screenings:[]};setDB(db);pacienteActual=v;vista="ficha";render();}
function seleccionarPaciente(id){pacienteActual=id;vista="ficha";render();}
function procesarCodigo(){
  const code=(document.getElementById("codeIn").value||"").trim();
  const err=document.getElementById("codeErr");
  // ¿Es código de seguimiento?
  const seg=parseCodigoSeg(code);
  if(seg){
    const d=pacData();
    if(!d.screenings||!d.screenings.length){err.textContent="Este paciente no tiene screening inicial. Procesa primero su primer registro completo.";err.style.display="block";return;}
    if(!d.seguimientos)d.seguimientos=[];
    d.seguimientos.push({fecha:seg.fecha,perfil:seg.perfil,resp:seg.resp,cuali:seg.cuali,score:scoreSeg(seg.resp),consent:seg.consent||null});
    d.seguimientos.sort((a,b)=>a.fecha<b.fecha?-1:1);
    if(seg.consent)d.ultimoConsent=seg.consent;
    const db=getDB();db[pacienteActual]=d;setDB(db);
    vista="evolucion";render();return;
  }
  // ¿Es screening inicial?
  const p=parseCodigo(code);
  if(!p){err.textContent="No se reconoce el código. Copia el texto completo que envió el paciente (empieza por AICE-TEC o AICE-SEG).";err.style.display="block";return;}
  resp=p.resp;ctx={fecha:p.fecha,fase0:p.fase0,consent:p.consent};
  vista="prof_resultado";render();
}
function guardarScreening(){
  const a=analizar(resp), code=codificar(a), f=formulacion(a), pauta=pautaInicial(a);
  const d=pacData();if(!d.screenings)d.screenings=[];
  d.screenings.push({fecha:ctx.fecha||new Date().toISOString().split("T")[0],codigo:code,analisis:a,formul:f,pauta:pauta,fase0:ctx.fase0||{},consent:ctx.consent||null});
  d.screenings.sort((x,y)=>x.fecha<y.fecha?-1:1);
  if(ctx.consent)d.ultimoConsent=ctx.consent;
  const db=getDB();db[pacienteActual]=d;setDB(db);
  vista="ficha";render();
}
function generarPautaPaciente(mod){
  const m=MODULOS[mod];
  const nombre = (pacData()&&pacData().nombrePac) || "";
  const msg = `Hola${nombre?" "+nombre:""}, te dejo lo que vamos a trabajar esta semana 🌱\n\n`+
    `*${m.pac_titulo}*\n\n`+
    `${m.pac_por}\n\n`+
    `🧭 Para recordarlo, quédate con esta frase:\n"${m.pac_consigna}"\n\n`+
    `📝 Tarea de la semana:\n${m.pac_tarea}\n\n`+
    `🌐 Para acompañarte entre sesiones, tienes aquí tu espacio de práctica semanal:\nhttps://aprens-aisdiario.netlify.app\nHazlo una vez por semana, con calma, antes de que nos veamos. Es anónimo y no guarda nada: al terminar te genera un texto que me envías por aquí.\n\n`+
    `No hace falta que salga perfecto. Lo importante es que lo hagas con presencia, no con exigencia. Lo revisamos en la próxima sesión. Un abrazo.`;
  const urlWA="https://wa.me/?text="+encodeURIComponent(msg);
  const ov=document.createElement("div");ov.className="modal-ov";
  ov.innerHTML=`<div class="modal-bx" style="max-width:540px;max-height:88vh;overflow-y:auto">
    <div style="font-family:'Playfair Display',serif;font-size:19px;color:var(--azul);margin-bottom:6px">Mensaje de pauta para el paciente</div>
    <div style="font-size:12.5px;color:var(--gris);line-height:1.5;margin-bottom:14px">Redactado como mensaje tuyo. No contiene códigos, cifras ni referencias a ningún sistema automático. Revísalo, ajústalo si quieres y envíalo tú.</div>
    <textarea id="pmTa" class="ipt" style="height:260px;font-size:13px;line-height:1.6;resize:vertical">${msg.replace(/</g,"&lt;")}</textarea>
    <div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;justify-content:center">
      <a href="${urlWA}" target="_blank" rel="noopener" class="btn bwa bsm" onclick="(function(){var t=document.getElementById('pmTa').value;this.href='https://wa.me/?text='+encodeURIComponent(t);}).call(this)">📱 Abrir en WhatsApp</a>
      <button class="btn bp bsm" onclick="(function(b){var ta=document.getElementById('pmTa');ta.focus();ta.select();ta.setSelectionRange(0,ta.value.length);try{document.execCommand('copy');}catch(e){}if(navigator.clipboard&&window.isSecureContext)navigator.clipboard.writeText(ta.value).catch(function(){});b.textContent='✓ Copiado';})(this)">📋 Copiar mensaje</button>
      <button class="btn bs bsm" onclick="this.closest('.modal-ov').remove()">Cerrar</button>
    </div>
    <div style="font-size:11.5px;color:var(--gris);margin-top:12px;line-height:1.5;background:var(--azulLt);border-radius:8px;padding:10px 12px">💡 Puedes editar el texto antes de enviarlo para personalizarlo a tu paciente.</div>
  </div>`;
  ov.addEventListener("click",e=>{if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
}
function verResultado(i){ctx.verIdx=i;vista="ver_resultado";render();}
let _chS=null,_chA=null;
function dibujarEvolucion(seg){
  const labels=seg.map(s=>s.fecha);
  const e1=document.getElementById("chSeg");
  if(e1){
    if(_chS){try{_chS.destroy();}catch(e){}}
    _chS=new Chart(e1,{type:"line",data:{labels,datasets:[
      {label:"Índice global",data:seg.map(s=>s.score.indice),borderColor:"#1B4F8C",backgroundColor:"#1B4F8C",borderWidth:3,tension:.3,pointRadius:4},
      {label:"Latencia",data:seg.map(s=>s.score.latencia),borderColor:"#E07B39",backgroundColor:"#E07B39",borderWidth:2,tension:.3,pointRadius:3},
      {label:"Continuidad",data:seg.map(s=>s.score.continuidad),borderColor:"#2E7D5E",backgroundColor:"#2E7D5E",borderWidth:2,tension:.3,pointRadius:3},
      {label:"Conducta con valor",data:seg.map(s=>s.score.valores),borderColor:"#7B4FC1",backgroundColor:"#7B4FC1",borderWidth:2,tension:.3,pointRadius:3}
    ]},options:{responsive:true,maintainAspectRatio:false,animation:false,resizeDelay:200,scales:{y:{min:0,max:10,ticks:{stepSize:2,font:{size:10}}},x:{ticks:{font:{size:10}}}},plugins:{legend:{labels:{font:{size:10,family:"'DM Sans'"},boxWidth:11}}}}});
  }
  const e2=document.getElementById("chAis");
  if(e2){
    if(_chA){try{_chA.destroy();}catch(e){}}
    _chA=new Chart(e2,{type:"line",data:{labels,datasets:[
      {label:"AIS basal (sin motivo)",data:seg.map(s=>s.score.aisBasal),borderColor:"#2E7D5E",backgroundColor:"#2E7D5E",borderWidth:3,tension:.3,pointRadius:4},
      {label:"AIS reactivo (en crisis)",data:seg.map(s=>s.score.aisReactivo),borderColor:"#E07B39",backgroundColor:"#E07B39",borderWidth:2,borderDash:[5,4],tension:.3,pointRadius:3}
    ]},options:{responsive:true,maintainAspectRatio:false,animation:false,resizeDelay:200,scales:{y:{min:0,max:10,ticks:{stepSize:2,font:{size:10}}},x:{ticks:{font:{size:10}}}},plugins:{legend:{labels:{font:{size:11,family:"'DM Sans'"},boxWidth:12}}}}});
  }
}

// ═══ SEGUIMIENTO (acciones) ═══
function aceptarConsentimiento(numOpc){
  const main=document.getElementById("cMain");
  if(!main||!main.checked){const e=document.getElementById("cErr");if(e)e.style.display="block";return;}
  const opc=[];
  for(let i=0;i<numOpc;i++){const c=document.getElementById("cOpt"+i);opc.push(c&&c.checked?1:0);}
  const cfg=getConsentCfg();
  ctx.consent={aceptado:1,fecha:new Date().toISOString().split("T")[0],ver:(cfg&&cfg.ver)||1,opc:opc};
  vista="pac_intro";render();
}
function validarNumPaciente(){
  const v=(document.getElementById("numIn").value||"").trim();
  const dec=decodificar(v);
  if(!dec){document.getElementById("numErr").style.display="block";return;}
  ctx={fecha:new Date().toISOString().split("T")[0],perfil:v,cuali:""};
  resp={};bIdx=0;vista="seg_cuestionario";render();
}
function responderSeg(v){
  resp[SEG_ITEMS[bIdx].id]=v;
  if(bIdx<SEG_ITEMS.length-1){bIdx++;render();}
  else{vista="seg_cuali";render();}
}
function finalizarSeg(){
  ctx.cuali=(document.getElementById("cualiIn").value||"").trim();
  vista="seg_codigo";render();
}
function genCodigoSeg(){
  const vals=SEG_ITEMS.map(it=>resp[it.id]===undefined?"-":resp[it.id]).join(",");
  const cu=encodeURIComponent(ctx.cuali||"");
  const cons=ctx.consent?("1~"+ctx.consent.fecha+"~"+ctx.consent.ver+"~"+(ctx.consent.opc||[]).join("")):"0~~~";
  return "AICE-SEG|v2|"+(ctx.perfil||"000")+"|"+(ctx.fecha||"")+"|"+vals+"|"+cu+"|"+encodeURIComponent(cons);
}
function parseCodigoSeg(code){
  try{
    const p=code.trim().split("|");
    if(p[0]!=="AICE-SEG")return null;
    const perfil=p[2],fecha=p[3],vals=p[4].split(","),cuali=decodeURIComponent(p[5]||"");
    if(vals.length!==SEG_ITEMS.length)return null;
    const r={};SEG_ITEMS.forEach((it,i)=>{if(vals[i]!=="-")r[it.id]=+vals[i];});
    let consent=null;
    if(p[6]){try{const cp=decodeURIComponent(p[6]).split("~");if(cp[0]==="1")consent={aceptado:1,fecha:cp[1]||"",ver:cp[2]||"",opc:(cp[3]||"").split("").map(Number)};}catch{}}
    return {perfil,fecha,resp:r,cuali,consent};
  }catch{return null;}
}

// ═══ EXPORT / IMPORT ═══
function _resumenVersion(db){
  // Añade a cada paciente metadatos de versión: nº de screenings, nº de seguimientos, última fecha
  const meta={};
  Object.keys(db).forEach(id=>{
    const scr=(db[id].screenings||[]), seg=(db[id].seguimientos||[]);
    const fechas=[].concat(scr.map(s=>s.fecha),seg.map(s=>s.fecha)).filter(Boolean).sort();
    meta[id]={screenings:scr.length,seguimientos:seg.length,ultimaFecha:fechas.length?fechas[fechas.length-1]:null,totalRegistros:scr.length+seg.length};
  });
  return meta;
}
function _descargar(texto,nombre){
  const ua=navigator.userAgent||"",emb=/FBAN|FBAV|Instagram|Line|MicroMessenger/i.test(ua);
  let ok=false;
  try{const b=new Blob([texto],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=nombre;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(u),1000);ok=true;}catch(e){ok=false;}
  if(emb||!ok){
    const ov=document.createElement("div");ov.className="modal-ov";
    ov.innerHTML=`<div class="modal-bx" style="max-width:560px;max-height:85vh;overflow-y:auto"><div style="font-family:'Playfair Display',serif;font-size:19px;color:var(--azul);margin-bottom:8px">Copia de datos</div><div style="background:#FFF8E8;border-left:3px solid #E0A800;border-radius:8px;padding:12px;font-size:13px;color:#7a5a00;line-height:1.55;margin-bottom:12px">Tu navegador no permite descargar. Copia este texto y guárdalo como archivo .json.</div><textarea readonly class="ipt" style="height:200px;font-family:monospace;font-size:11px">${texto.replace(/</g,"&lt;")}</textarea><div style="display:flex;gap:10px;margin-top:12px;justify-content:center"><button class="btn bp bsm" onclick="(function(b){var ta=b.parentElement.previousElementSibling;ta.select();try{document.execCommand('copy');}catch(e){}if(navigator.clipboard)navigator.clipboard.writeText(ta.value);b.textContent='✓ Copiado';}).call(this,this)">📋 Copiar todo</button><button class="btn bs bsm" onclick="this.closest('.modal-ov').remove()">Cerrar</button></div></div>`;
    ov.addEventListener("click",e=>{if(e.target===ov)ov.remove();});
    document.body.appendChild(ov);
  }
}
function exportar(){
  const db=getDB();
  const payload={app:"APRENS_TEC",version:2,exportado:new Date().toISOString(),resumen:_resumenVersion(db),datos:db};
  _descargar(JSON.stringify(payload,null,2),"APRENS_TEC_backup_"+new Date().toISOString().split("T")[0]+".json");
}
function exportarInvestigacion(){
  // Versión SIN datos identificativos (sin nombre/iniciales en fase0). Mantiene código de paciente y puntuaciones.
  const db=getDB(), out={};
  Object.keys(db).forEach(id=>{
    const p=db[id], scr=(p.screenings||[]).map(s=>{
      const f0=Object.assign({},s.fase0||{}); delete f0.nombre; // quitar nombre/iniciales libres
      return {fecha:s.fecha,codigo:s.codigo,analisis:s.analisis,formul:s.formul,fase0:{edad:f0.edad||"",contexto:f0.contexto||"",situacion:f0.situacion||""}};
    });
    const seg=(p.seguimientos||[]).map(s=>({fecha:s.fecha,perfil:s.perfil,score:s.score})); // sin texto cualitativo (puede contener datos personales)
    out[id]={screenings:scr,seguimientos:seg};
  });
  const payload={app:"APRENS_TEC_INVESTIGACION",version:2,exportado:new Date().toISOString(),nota:"Export sin nombre ni texto libre. ATENCIÓN: el código de paciente puede seguir siendo reidentificable por el profesional de origen; esto es dato pseudonimizado, no anónimo a efectos legales.",resumen:_resumenVersion(db),datos:out};
  _descargar(JSON.stringify(payload,null,2),"APRENS_TEC_investigacion_"+new Date().toISOString().split("T")[0]+".json");
}
function importar(input){
  const file=input.files&&input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const o=JSON.parse(e.target.result);
      if(!o||(o.app!=="APRENS_TEC"&&o.app!=="APRENS_TEC_INVESTIGACION")||!o.datos)throw 0;
      const act=getDB(),nv=o.datos;let np=0,nf=0,nsg=0;
      Object.keys(nv).forEach(id=>{
        if(!act[id]){act[id]=nv[id];np++;}
        else{
          // SCREENINGS: fusionar sin duplicar (clave fecha+codigo)
          const ex=act[id].screenings||[],cl=new Set(ex.map(s=>s.fecha+"|"+s.codigo));
          (nv[id].screenings||[]).forEach(s=>{if(!cl.has(s.fecha+"|"+s.codigo)){ex.push(s);nf++;}});
          ex.sort((a,b)=>a.fecha<b.fecha?-1:1);act[id].screenings=ex;
          // SEGUIMIENTOS: una entrada por fecha; si coincide la fecha, se queda la versión importada (más reciente al regrabar)
          const map={};
          (act[id].seguimientos||[]).forEach(s=>{map[s.fecha]=s;});
          (nv[id].seguimientos||[]).forEach(s=>{ if(!map[s.fecha])nsg++; map[s.fecha]=s; });
          act[id].seguimientos=Object.values(map).sort((a,b)=>a.fecha<b.fecha?-1:1);
        }
      });
      setDB(act);
      const ov=document.createElement("div");ov.className="modal-ov";
      ov.innerHTML=`<div class="modal-bx" style="text-align:center"><div style="font-size:40px;margin-bottom:10px">✅</div><div style="font-size:15px;color:#333;line-height:1.6;margin-bottom:16px">Importado correctamente.<br>Pacientes nuevos: <strong>${np}</strong><br>Screenings añadidos: <strong>${nf}</strong><br>Seguimientos actualizados: <strong>${nsg}</strong></div><div style="font-size:12px;color:var(--gris);margin-bottom:14px">Los registros con la misma fecha se han reemplazado por la versión más reciente del archivo.</div><button class="btn bp bsm" onclick="this.closest('.modal-ov').remove();render()">Aceptar</button></div>`;
      document.body.appendChild(ov);
    }catch(err){
      const ov=document.createElement("div");ov.className="modal-ov";
      ov.innerHTML=`<div class="modal-bx" style="text-align:center"><div style="font-size:40px;margin-bottom:10px">❌</div><div style="font-size:14px;color:#333;line-height:1.6;margin-bottom:16px">No se pudo importar. Selecciona un archivo APRENS_TEC (.json) válido.</div><button class="btn bs bsm" onclick="this.closest('.modal-ov').remove()">Cerrar</button></div>`;
      document.body.appendChild(ov);
    }
    input.value="";
  };
  r.readAsText(file);
}
render();
</script>
