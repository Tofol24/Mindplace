<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#F4EFE6">
<title>El tiempo límite · APRENS</title>
<style>
  :root{
    --bg:#F4EFE6; --card:#FBF8F1; --tinta:#2A2622; --suau:#6f665b;
    --verde:#6E7256; --verde-d:#565a41; --verde-lt:#e8ead9;
    --terra:#b87a5e; --terra-d:#8f5b3f; --terra-lt:#f2e4d9;
    --oro:#a9781f; --linia:#e2d8c4;
    --ombra:0 10px 30px rgba(50,42,32,.10); --ombra-s:0 2px 12px rgba(50,42,32,.07);
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,"Times New Roman",serif;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --r:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--tinta);line-height:1.62;font-size:16.5px;
    -webkit-font-smoothing:antialiased;padding:0 0 calc(46px + env(safe-area-inset-bottom));overflow-x:hidden}
  .wrap{max-width:620px;margin:0 auto;padding:0 16px}

  /* toggle idioma */
  .langbar{position:sticky;top:0;z-index:30;display:flex;justify-content:flex-end;gap:0;
    padding:10px 16px;background:linear-gradient(180deg,rgba(244,239,230,.96),rgba(244,239,230,.75) 70%,rgba(244,239,230,0));backdrop-filter:saturate(120%) blur(3px)}
  .lang{display:inline-flex;border:1px solid var(--linia);border-radius:999px;overflow:hidden;background:var(--card);box-shadow:var(--ombra-s)}
  .lang button{border:0;background:transparent;font-family:var(--sans);font-size:12.5px;font-weight:700;letter-spacing:.06em;
    padding:7px 15px;cursor:pointer;color:var(--suau)}
  .lang button.on{background:var(--verde);color:#fff}

  /* portada */
  header.hero{text-align:center;padding:20px 8px 4px}
  .eyebrow{display:inline-block;font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--terra-d);
    background:var(--terra-lt);border:1px solid var(--linia);padding:5px 13px;border-radius:999px;font-weight:700;margin-bottom:16px}
  h1{font-family:var(--serif);font-size:32px;line-height:1.14;margin:0 auto;max-width:13em;font-weight:600;letter-spacing:-.01em}
  .sub{color:var(--suau);font-size:15.5px;margin:14px auto 0;max-width:26em}

  .esc{display:flex;justify-content:center;margin:14px 0 2px}
  .esc svg{width:100%;max-width:280px;height:auto}

  /* bloque objetivos */
  .objs{background:var(--verde-lt);border:1px solid #d3ddc7;border-radius:var(--r);padding:16px 18px;margin:16px 0}
  .objs .ol{font-size:11.5px;text-transform:uppercase;letter-spacing:.1em;font-weight:800;color:var(--verde-d);margin-bottom:8px}
  .objs ul{margin:0;padding-left:18px}
  .objs li{margin:5px 0;font-size:14.5px;color:#3f4a37}

  /* pasos */
  .step{background:var(--card);border:1px solid var(--linia);border-radius:var(--r);padding:20px 19px;margin:14px 0;box-shadow:var(--ombra-s)}
  .step .n{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;
    background:var(--verde);color:#fff;font-family:var(--serif);font-weight:700;font-size:16px;flex:0 0 auto}
  .step.warm .n{background:var(--terra)}
  .step h2{font-family:var(--serif);font-size:20px;margin:0;font-weight:600;line-height:1.25}
  .step .hd{display:flex;align-items:center;gap:12px;margin-bottom:8px}
  .step p{margin:9px 0}
  .step p b{color:var(--verde-d)}
  .step.warm p b{color:var(--terra-d)}
  .lead{color:var(--suau)}
  ul.tidy{margin:8px 0;padding-left:20px}
  ul.tidy li{margin:4px 0}

  /* frase modelo */
  .say{font-family:var(--serif);font-style:italic;font-size:17.5px;line-height:1.5;color:var(--verde-d);
    background:var(--verde-lt);border-left:4px solid var(--oro);border-radius:0 12px 12px 0;padding:14px 16px;margin:12px 0}
  .say.warm{color:var(--terra-d);background:var(--terra-lt);border-left-color:var(--terra)}
  .say .who{display:block;font-family:var(--sans);font-style:normal;font-size:11px;text-transform:uppercase;letter-spacing:.1em;font-weight:700;opacity:.7;margin-bottom:5px}

  /* aviso / nota */
  .note{display:flex;gap:11px;background:#fff8ec;border:1px solid #f0e2c4;border-radius:14px;padding:13px 15px;margin:12px 0;font-size:14px;color:#6f561f;line-height:1.55}
  .note .e{font-size:18px;line-height:1.4;flex:0 0 auto}

  /* core / cierre */
  .core{background:linear-gradient(155deg,var(--verde),#4f5540);color:#fff;border-radius:16px;padding:18px 20px;margin:18px 0;
    font-family:var(--serif);font-size:18.5px;line-height:1.45}
  .core .who{display:block;font-family:var(--sans);font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;opacity:.8;margin-bottom:6px}

  .cta{margin:16px 0}
  .cta a{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--linia);border-radius:14px;
    padding:13px 15px;color:var(--tinta);text-decoration:none;font-weight:600;font-size:14.5px;box-shadow:var(--ombra-s);margin:8px 0}
  .cta a .ce{font-size:20px;flex:0 0 auto}
  .cta a .cd{display:block;font-weight:400;font-size:12.5px;color:var(--suau);margin-top:1px}
  .cta a .arr{margin-left:auto;color:var(--suau)}

  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin:8px 0 0;padding:13px 16px;border:0;
    border-radius:13px;background:var(--terra);color:#fff;font-family:var(--sans);font-size:14.5px;font-weight:700;cursor:pointer;box-shadow:var(--ombra-s)}
  .btn:active{transform:scale(.99)}
  .btn.ok{background:var(--verde)}

  .sec-tag{font-size:11.5px;text-transform:uppercase;letter-spacing:.14em;font-weight:800;color:var(--terra-d);margin:26px 4px 2px}

  footer{text-align:center;color:var(--suau);font-size:12.5px;margin:26px 0 8px;line-height:1.55}
  footer b{font-family:var(--serif);color:var(--verde-d)}
  @media(max-width:380px){h1{font-size:28px}}
</style>
</head>
<body>

<div class="langbar">
  <div class="lang" role="group" aria-label="Idioma / Idioma">

  <div class="esc" aria-hidden="true">

      <g transform="translate(126,52)">

        <circle cx="0" cy="0" r="19" fill="#c8b79b"/>
        <circle cx="-6" cy="-2" r="2.1" fill="#3a3128"/><circle cx="6" cy="-2" r="2.1" fill="#3a3128"/>
        <path d="M-6,7 q6,5 12,0" stroke="#7d6a4e" stroke-width="1.6" fill="none" stroke-linecap="round"/>

        <ellipse cx="0" cy="26" rx="18" ry="24" fill="#cf9270"/>

        <circle cx="-4.5" cy="-1" r="1.7" fill="#3a3128"/><circle cx="4.5" cy="-1" r="1.7" fill="#3a3128"/>
        <path d="M-4,5 q4,4 8,0" stroke="#9c6a49" stroke-width="1.4" fill="none" stroke-linecap="round"/>
        <path d="M-14,18 q-16,-4 -26,4" stroke="#cf9270" stroke-width="7" fill="none" stroke-linecap="round"/>

      <path d="M150,70 q4,-9 9,-2 q5,-7 9,2 q0,7 -9,13 q-9,-6 -9,-13 Z" fill="#c98f7a"/>
    </svg>
  </div>

  <div id="content"></div>

  <footer><b>Centre APRENS</b> · TEC · AIS<br><span id="foot"></span></footer>
</div>

var LANG = "es";

function esc(s){ return s; } // el contenido es de confianza (definido arriba)

function blockHTML(b, warm){
  if(b.t==="p") return '<p'+(b.lead?' class="lead"':'')+'>'+b.h+'</p>';
  if(b.t==="say") return '<div class="say'+(b.warm?' warm':'')+'">'+(b.who?'<span class="who">'+b.who+'</span>':'')+b.h+'</div>';
  if(b.t==="note") return '<div class="note"><span class="e">'+(b.e||"💡")+'</span><span>'+b.h+'</span></div>';
  if(b.t==="list") return '<ul class="tidy">'+b.items.map(function(i){return '<li>'+i+'</li>';}).join('')+'</ul>';
  return '';
}
function stepHTML(s){
  var body = s.blocks.map(function(b){return blockHTML(b, s.warm);}).join('');
  return '<div class="step'+(s.warm?' warm':'')+'">'
    + '<div class="hd"><span class="n">'+s.n+'</span><h2>'+s.tit+'</h2></div>'
    + body + '</div>';
}

function render(){
  var d = T[LANG];
  document.documentElement.lang = LANG;
  document.getElementById("eyebrow").innerHTML = d.eyebrow;
  document.getElementById("h1").textContent = d.h1;
  document.getElementById("sub").textContent = d.sub;
  document.getElementById("foot").textContent = d.foot;

  var html = "";
  d.intro.forEach(function(b){ html += blockHTML(b); });

  html += '<div class="objs"><div class="ol">'+d.objsTitle+'</div><ul>'
        + d.objs.map(function(o){return '<li>'+o+'</li>';}).join('') + '</ul></div>';

  html += '<div class="sec-tag">'+d.tagBefore+'</div>';
  d.steps0.forEach(function(s){ html += stepHTML(s); });

  html += '<div class="sec-tag">'+d.tagTech+'</div>';
  d.steps.forEach(function(s){ html += stepHTML(s); });

  html += '<div class="core"><span class="who">'+d.coreWho+'</span>'+d.core+'</div>';

  html += '<div class="sec-tag">'+d.acuerdoTag+'</div>';
  html += '<div class="step"><div class="hd"><span class="n">✓</span><h2>'+d.acuerdoTit+'</h2></div>'
        + d.acuerdo.map(function(b){return blockHTML(b);}).join('') + '</div>';

  html += '<div class="sec-tag">'+d.ctaTag+'</div><div class="cta">'
        + d.cta.map(function(c){return '<a href="'+c.url+'" target="_top"><span class="ce">'+c.e+'</span>'
            + '<span>'+c.tit+'<span class="cd">'+c.d+'</span></span><span class="arr">→</span></a>';}).join('')
        + '</div>';

  html += '<button class="btn" id="shareBtn" onclick="copyGuion(this)">'+d.shareBtn+'</button>';

  document.getElementById("content").innerHTML = html;
}

function setLang(l){
  LANG = l;
  document.getElementById("btEs").classList.toggle("on", l==="es");
  document.getElementById("btCa").classList.toggle("on", l==="ca");
  render();
  window.scrollTo({top:0, behavior:"auto"});
}

function copyGuion(btn){
  var d = T[LANG];
  var text = d.shareText.join("\n");
  function ok(){
    var orig = btn.textContent; btn.classList.add("ok"); btn.textContent = "✓ " + d.shareOk;
    setTimeout(function(){ btn.classList.remove("ok"); btn.textContent = orig; }, 1700);
  }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(ok).catch(function(){ fallback(text, ok); });
  } else { fallback(text, ok); }
}
function fallback(text, ok){
  try{
    var ta = document.createElement("textarea"); ta.value = text; ta.style.position="fixed"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); ok();
  }catch(e){ alert(text); }
}
